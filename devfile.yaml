schemaVersion: 2.2.0
metadata:
  name: ansible-molecule-nested-podman
  displayName: Ansible + Molecule (Podman Driver)
  description: Workspace with nested container support for Molecule podman driver
attributes:
  controller.devfile.io/storage-type: per-workspace

components:
  - name: dev-tools
    attributes:
      container-overrides:
        securityContext:
          privileged: true
    container:
      image: ghcr.io/juanlu-sanz/nested-podman-devspaces:latest
      memoryLimit: 6Gi
      cpuLimit: 2000m
      mountSources: true
      env:
        - name: SHELL
          value: "/bin/bash"
        - name: ANSIBLE_FORCE_COLOR
          value: "true"
        - name: MOLECULE_NO_LOG
          value: "false"
        - name: PY_COLORS
          value: "1"
      volumeMounts:
        - name: workspace-storage
          path: /home/user/.local
  - name: workspace-storage
    volume:
      size: 10Gi

commands:
  - id: setup-molecule
    exec:
      component: dev-tools
      commandLine: |
        unset CONTAINER_HOST &&
        pip install --user ansible-core molecule "molecule-plugins[podman]" ansible-lint pytest-testinfra &&
        echo "=== Molecule environment ready ==="
      workingDir: ${PROJECT_SOURCE}
      label: "Setup Molecule Environment"
      group:
        kind: build
        isDefault: true

events:
  postStart:
    - setup-molecule
