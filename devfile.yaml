schemaVersion: 2.2.0
metadata:
  name: ansible-molecule-nested-podman
  displayName: Ansible + Molecule (Podman Driver)
  description: Workspace with nested container support for Molecule podman driver
attributes:
  controller.devfile.io/storage-type: per-workspace

components:
  - name: dev-tools
    attributes:
      container-overrides:
        securityContext:
          privileged: true
    container:
      image: ghcr.io/juanlu-sanz/nested-podman-devspaces:latest
      memoryLimit: 6Gi
      cpuLimit: 2000m
      mountSources: true
      env:
        - name: SHELL
          value: "/bin/bash"
        - name: CONTAINER_HOST
          value: ""
        - name: ANSIBLE_FORCE_COLOR
          value: "true"
        - name: MOLECULE_NO_LOG
          value: "false"
        - name: PY_COLORS
          value: "1"
      volumeMounts:
        - name: workspace-storage
          path: /home/user/.local
  - name: workspace-storage
    volume:
      size: 10Gi

commands:
  - id: configure-podman
    exec:
      component: dev-tools
      commandLine: |
        if ! whoami &>/dev/null 2>&1; then
          if [ -w /etc/passwd ]; then
            echo "user:x:$(id -u):0:user:/home/user:/bin/bash" >> /etc/passwd
          fi
        fi
        USER_NAME=$(whoami 2>/dev/null || echo user)
        START_ID=$(( $(id -u) + 1 ))
        echo "${USER_NAME}:${START_ID}:2147483646" > /etc/subuid 2>/dev/null || true
        echo "${USER_NAME}:${START_ID}:2147483646" > /etc/subgid 2>/dev/null || true
        mkdir -p ${HOME}/.config/containers
        echo 'unqualified-search-registries = ["registry.access.redhat.com", "registry.redhat.io", "docker.io"]' > ${HOME}/.config/containers/registries.conf
        echo 'short-name-mode = "permissive"' >> ${HOME}/.config/containers/registries.conf
        echo "Podman configured for user ${USER_NAME} (UID $(id -u))"
      workingDir: /
      label: "Configure Podman"
      group:
        kind: build
        isDefault: true

  - id: molecule-test
    exec:
      component: dev-tools
      commandLine: molecule test
      workingDir: ${PROJECT_SOURCE}
      label: "Run Molecule Test"
      group:
        kind: test
        isDefault: true

events:
  postStart:
    - configure-podman
